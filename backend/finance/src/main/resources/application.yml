server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/personal_finance?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

    jackson:
      property-naming-strategy: SNAKE_CASE
      date-format: yyyy-MM-dd HH:mm:ss
      time-zone: Asia/Shanghai


mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath:mapper/*.xml
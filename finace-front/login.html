<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>登录 - 个人理财管理系统</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    .login-box {
      width: 100%;
      max-width: 450px;
      margin: 100px auto;
    }
    .to-register {
      text-align: center;
      margin-top: 15px;
    }
    .to-register a {
      color: #409eff;
      text-decoration: none;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card login-box">
    <h2 class="title" style="text-align:center;">个人理财管理系统</h2>
    <form id="loginForm">
      <div class="form-item">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名">
      </div>
      <div class="form-item">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码">
      </div>
      <button type="button" class="btn btn-primary" style="width:100%" onclick="doLogin()">登录</button>
    </form>
    <div class="to-register">
      没有账号？<a href="register.html">立即注册</a>
    </div>
  </div>
</div>

<script src="js/utils.js"></script>
<script>
// 跳过后端，直接登录成功
async function doLogin() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !password) {
    alert("请输入用户名和密码！");
    return;
  }

  // 直接设置登录状态
  setToken("test_token");
  alert("登录成功！");
  location.href = "index.html";
}
</script>
</body>
</html>

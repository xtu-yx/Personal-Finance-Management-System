<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>记账管理 - 个人理财管理系统</title>
  <link rel="stylesheet" href="css/common.css">
</head>
<body>
<div class="navbar">
  <div class="container">
    <div>📊 个人理财管理系统</div>
    <div>
      <a href="index.html">首页</a>
      <a href="record.html">记账管理</a>
      <a href="budget.html">预算管理</a>
      <a href="javascript:logout()">退出登录</a>
    </div>
  </div>
</div>

<div class="container">
  <div class="card">
    <div class="title">新增收支记录</div>
    <div class="form-item">
      <label>收支类型</label>
      <select id="type">
        <option value="0">支出</option>
        <option value="1">收入</option>
      </select>
    </div>
    <div class="form-item">
      <label>消费分类</label>
      <select id="category">
        <option>餐饮</option>
        <option>交通</option>
        <option>购物</option>
        <option>娱乐</option>
        <option>工资</option>
        <option>奖金</option>
        <option>兼职</option>
      </select>
    </div>
    <div class="form-item">
      <label>金额</label>
      <input id="money" type="number" placeholder="请输入金额">
    </div>
    <div class="form-item">
      <label>记录日期</label>
      <input id="createTime" type="date">
    </div>
    <button class="btn btn-success" onclick="addRecord()">提交记录</button>
  </div>

  <div class="card">
    <div class="title">收支记录列表</div>
    <table class="table">
      <thead>
        <tr>
          <th>类型</th>
          <th>分类</th>
          <th>金额</th>
          <th>日期</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="recordTable"></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="js/utils.js"></script>
<script type="module" src="js/api.js"></script>
<script>
window.onload = function () {
  if (!getToken()) { location.href = "login.html"; return; }
  document.getElementById("createTime").value = getNowDate();
  getList();
};

async function getList() {
  const res = await getRecordList({});
  if (res.code === 200) {
    const list = res.data;
    let html = "";
    list.forEach(item => {
      const type = item.type === 0 ? "支出" : "收入";
      html += `
        <tr>
          <td>${type}</td>
          <td>${item.category}</td>
          <td>${item.money}</td>
          <td>${item.createTime}</td>
          <td>
            <button class="btn btn-danger" onclick="del(${item.id})">删除</button>
          </td>
        </tr>
      `;
    });
    document.getElementById("recordTable").innerHTML = html;
  }
}

async function addRecord() {
  const type = document.getElementById("type").value;
  const category = document.getElementById("category").value;
  const money = document.getElementById("money").value;
  const createTime = document.getElementById("createTime").value;

  if (!checkEmpty(money) || !checkEmpty(createTime)) {
    alert("请填写完整信息！");
    return;
  }

  const res = await addRecord({type, category, money, createTime});
  if (res.code === 200) {
    alert("添加成功！");
    getList();
  } else {
    alert(res.msg || "添加失败");
  }
}

async function del(id) {
  if (!confirm("确定删除该记录？")) return;
  const res = await deleteRecord(id);
  if (res.code === 200) {
    alert("删除成功");
    getList();
  }
}
</script>
</body>
</html>

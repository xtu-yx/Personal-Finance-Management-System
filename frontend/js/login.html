<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 个人理财管理系统</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-box {
      width: 100%;
      max-width: 450px;
      margin: 100px auto;
    }
    .to-register {
      text-align: center;
      margin-top: 15px;
    }
    .to-register a {
      color: #409eff;
      text-decoration: none;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card login-box">
    <h2 class="title" style="text-align:center;">个人理财管理系统</h2>
    <div id="alert" class="alert"></div>
    <form id="loginForm">
      <div class="form-item">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="请输入用户名">
      </div>
      <div class="form-item">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%" id="loginBtn">登 录</button>
    </form>
    <div class="to-register">
      <a href="forgot-password.html" style="float:left;">忘记密码？</a>
      没有账号？<a href="register.html">立即注册</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
<script src="js/axios-config.js"></script>
<script src="js/toast.js"></script>
<script src="js/login.js"></script>
</body>
</html>

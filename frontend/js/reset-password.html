<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重置密码 - 个人理财管理系统</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .reset-box {
      width: 100%;
      max-width: 450px;
      margin: 100px auto;
    }
    .back-login {
      text-align: center;
      margin-top: 15px;
    }
    .back-login a {
      color: #409eff;
      text-decoration: none;
    }
    .token-info {
      text-align: center;
      padding: 10px;
      background: #f1f5f9;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #64748b;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card reset-box">
    <h2 class="title" style="text-align:center;">重置密码</h2>
    <div id="alert" class="alert"></div>
    
    <div class="token-info">
      Token: <span id="tokenDisplay">--</span>
    </div>
    
    <form id="resetForm">
      <div class="form-item">
        <label for="newPassword">新密码</label>
        <input type="password" id="newPassword" placeholder="请输入新密码（至少6位）">
      </div>
      <div class="form-item">
        <label for="confirmPassword">确认密码</label>
        <input type="password" id="confirmPassword" placeholder="请再次输入新密码">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%" id="submitBtn">重置密码</button>
    </form>
    
    <div class="back-login">
      <a href="login.html">返回登录</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
<script src="js/axios-config.js"></script>
<script src="js/toast.js"></script>
<script src="js/reset-password.js"></script>

</body>
</html>

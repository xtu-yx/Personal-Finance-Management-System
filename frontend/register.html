<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 个人理财管理系统</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .register-box {
      max-width: 450px;
      margin: 80px auto;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card register-box">
    <h2 class="title" style="text-align:center;">用户注册</h2>
    <div id="alert" class="alert"></div>
    <form id="registerForm">
      <div class="form-item">
        <label for="username">用户名</label>
        <input id="username" placeholder="设置用户名">
      </div>
      <div class="form-item">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="设置密码">
      </div>
      <div class="form-item">
        <label for="confirmPassword">确认密码</label>
        <input type="password" id="confirmPassword" placeholder="再次输入密码">
      </div>
      <div class="form-item">
        <label for="email">邮箱</label>
        <input type="email" id="email" placeholder="请输入邮箱">
      </div>
      <button type="submit" class="btn btn-success" style="width:100%" id="registerBtn">注 册</button>
    </form>
    <div style="text-align:center;margin-top:15px;">
      <a href="login.html">已有账号？去登录</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
<script src="js/axios-config.js"></script>
<script src="js/toast.js"></script>
<script src="js/register.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 个人理财管理系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo-text">
        <h1>个人<span>理财</span></h1>
        <p>创建新账户</p>
      </div>

      <div id="alert" class="alert alert-error"></div>

      <form id="registerForm">
        <div class="form-group">
          <label for="username">用户名</label>
          <input type="text" id="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
          <label for="email">邮箱</label>
          <input type="email" id="email" placeholder="请输入邮箱" required>
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" placeholder="请输入密码" required>
        </div>
        <div class="form-group">
          <label for="confirmPassword">确认密码</label>
          <input type="password" id="confirmPassword" placeholder="请再次输入密码" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="registerBtn">注 册</button>
      </form>

      <div class="auth-link">
        已有账户？<a href="index.html">返回登录</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
  <script src="js/axios-config.js"></script>
  <script src="js/register.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预算管理 - 个人理财管理系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
  <div class="logo">个人<span>理财</span></div>
  <ul class="nav-links">
    <li><a href="index.html">首页</a></li>
    <li><a href="records.html">记账管理</a></li>
    <li><a href="budget.html" class="active">预算管理</a></li>
  </ul>
  <div class="user-info">
    <span>欢迎，<span id="username" class="username">--</span></span>
    <button type="button" class="btn-logout" id="logoutBtn">退出登录</button>
  </div>
</nav>

<main class="container">
  <div class="card">
    <div class="card-header">
      <h2 class="card-title">月度预算设置</h2>
    </div>
    <div class="form-item">
      <label for="monthMoney">本月总预算金额</label>
      <input id="monthMoney" type="number" placeholder="请输入本月预算">
    </div>
    <button class="btn btn-primary" id="saveBudgetBtn">保存预算</button>
  </div>

  <div class="card">
    <div class="card-header">
      <h2 class="card-title">预算使用进度</h2>
    </div>
    <div id="budgetInfo" style="font-size:16px;line-height:2;"></div>
    <div style="width:100%;height:20px;background:#eee;border-radius:10px;margin-top:10px;">
      <div id="progressBar" style="height:100%;border-radius:10px;background:#409eff;width:0%;"></div>
    </div>
    <p style="margin-top:10px;" id="progressText">0%</p>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
<script src="js/axios-config.js"></script>
<script>
(function () {
  var currentUser = window.financeApp.requireCurrentUser();
  if (!currentUser) return;

  document.getElementById('username').textContent = currentUser.username || '用户#' + currentUser.id;
  document.getElementById('logoutBtn').addEventListener('click', window.financeApp.logout);
  document.getElementById('saveBudgetBtn').addEventListener('click', saveBudget);

  loadBudgetInfo();

  async function saveBudget() {
    var monthMoney = Number(document.getElementById('monthMoney').value);
    if (!monthMoney) { alert('请输入预算金额！'); return; }
    try {
      await api.post('/api/budget', { monthMoney: monthMoney });
      alert('预算保存成功！');
      loadBudgetInfo();
    } catch (err) { alert('保存失败'); }
  }

  async function loadBudgetInfo() {
    try {
      var data = await api.get('/api/budget', { params: { userId: currentUser.id } });
      var total = data.totalBudget || 0;
      var used = data.usedBudget || 0;
      var remain = total - used;
      var rate = total > 0 ? (used / total * 100).toFixed(1) : 0;

      var infoEl = document.getElementById('budgetInfo');
      infoEl.textContent = '';
      var lines = [
        '月度总预算：\u00a5 ' + total,
        '已消费金额：\u00a5 ' + used,
        '剩余预算：\u00a5 ' + remain
      ];
      lines.forEach(function (line, i) {
        infoEl.appendChild(document.createTextNode(line));
        if (i < lines.length - 1) {
          infoEl.appendChild(document.createElement('br'));
        }
      });

      var bar = document.getElementById('progressBar');
      var text = document.getElementById('progressText');
      bar.style.width = rate + '%';
      text.textContent = '已使用 ' + rate + '%';

      if (rate >= 90) bar.style.background = '#f56c6c';
      else if (rate >= 70) bar.style.background = '#e6a23c';
      else bar.style.background = '#409eff';
    } catch (err) {
      // 静默处理
    }
  }
})();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预算管理 - 个人理财管理系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
  <div class="logo">个人<span>理财</span></div>
  <ul class="nav-links">
    <li><a href="dashboard.html">仪表盘</a></li>
    <li><a href="statistics.html">统计分析</a></li>
    <li><a href="records.html">记账管理</a></li>
    <li><a href="budget.html" class="active">预算管理</a></li>
  </ul>
  <div class="user-info">
    <span>欢迎，<span id="username" class="username">--</span></span>
    <button type="button" class="btn-logout" id="logoutBtn">退出登录</button>
  </div>
</nav>

<main class="container">
  <div class="card">
    <div class="card-header">
      <h2 class="card-title">月度预算设置</h2>
    </div>
    <div class="form-item">
      <label for="monthMoney">本月总预算金额</label>
      <input id="monthMoney" type="number" placeholder="请输入本月预算">
    </div>
    <button class="btn btn-primary" id="saveBudgetBtn">保存预算</button>
  </div>

  <div class="card">
    <div class="card-header">
      <h2 class="card-title">预算使用进度</h2>
    </div>
    <div id="budgetInfo" style="font-size:16px;line-height:2;"></div>
    <div style="width:100%;height:20px;background:#eee;border-radius:10px;margin-top:10px;">
      <div id="progressBar" style="height:100%;border-radius:10px;background:#409eff;width:0%;"></div>
    </div>
    <p style="margin-top:10px;" id="progressText">0%</p>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
<script src="js/axios-config.js"></script>
<script src="js/budget.js"></script>

</body>
</html>

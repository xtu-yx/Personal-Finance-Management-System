<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>忘记密码 - 个人理财管理系统</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .forgot-box {
      width: 100%;
      max-width: 450px;
      margin: 100px auto;
    }
    .back-login {
      text-align: center;
      margin-top: 15px;
    }
    .back-login a {
      color: #409eff;
      text-decoration: none;
    }
    .success-message {
      text-align: center;
      padding: 20px;
      color: #22c55e;
      font-size: 16px;
    }
    .success-message p {
      margin-top: 10px;
      color: #64748b;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card forgot-box">
    <h2 class="title" style="text-align:center;">忘记密码</h2>
    <div id="alert" class="alert"></div>
    
    <div id="formSection">
      <p style="text-align:center;color:#64748b;margin-bottom:20px;">
        请输入您的注册邮箱，我们将发送密码重置链接
      </p>
      <form id="forgotForm">
        <div class="form-item">
          <label for="email">邮箱地址</label>
          <input type="email" id="email" placeholder="请输入注册邮箱">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%" id="submitBtn">发送重置链接</button>
      </form>
    </div>
    
    <div id="successSection" style="display:none;">
      <div class="success-message">
        <div style="font-size:48px;">✓</div>
        <p>重置链接已发送到您的邮箱</p>
        <p>请查收邮件并点击链接重置密码</p>
      </div>
    </div>
    
    <div class="back-login">
      <a href="login.html">返回登录</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
<script src="js/axios-config.js"></script>
<script src="js/toast.js"></script>
<script src="js/forgot-password.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记账管理 - 个人理财管理系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
  <div class="logo">个人<span>理财</span></div>
  <ul class="nav-links">
    <li><a href="index.html">首页</a></li>
    <li><a href="records.html" class="active">记账管理</a></li>
    <li><a href="budget.html">预算管理</a></li>
  </ul>
  <div class="user-info">
    <span>欢迎，<span id="username" class="username">--</span></span>
    <button type="button" class="btn-logout" id="logoutBtn">退出登录</button>
  </div>
</nav>

<main class="container">
  <div class="card">
    <div class="card-header">
      <h2 class="card-title">新增收支记录</h2>
    </div>
    <div class="form-item">
      <label for="type">收支类型</label>
      <select id="type">
        <option value="expense">支出</option>
        <option value="income">收入</option>
      </select>
    </div>
    <div class="form-item">
      <label for="category">消费分类</label>
      <select id="category">
        <option>餐饮</option><option>交通</option><option>购物</option><option>娱乐</option>
        <option>工资</option><option>奖金</option><option>兼职</option>
      </select>
    </div>
    <div class="form-item">
      <label for="money">金额</label>
      <input id="money" type="number" placeholder="请输入金额">
    </div>
    <div class="form-item">
      <label for="createTime">记录日期</label>
      <input id="createTime" type="date">
    </div>
    <button class="btn btn-success" id="addRecordBtn">提交记录</button>
  </div>

  <div class="card">
    <div class="card-header">
      <h2 class="card-title">收支记录列表</h2>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>类型</th><th>分类</th><th>金额</th><th>日期</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="recordTable"></tbody>
      </table>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
<script src="js/axios-config.js"></script>
<script>
(function () {
  var currentUser = window.financeApp.requireCurrentUser();
  if (!currentUser) return;

  document.getElementById('username').textContent = currentUser.username || '用户#' + currentUser.id;
  document.getElementById('logoutBtn').addEventListener('click', window.financeApp.logout);
  document.getElementById('addRecordBtn').addEventListener('click', addRecordFunc);

  document.getElementById('createTime').value = new Date().toISOString().slice(0, 10);
  getRecordList();

  async function getRecordList() {
    try {
      var pageData = await api.get('/api/records', { params: { userId: currentUser.id } });
      var list = pageData.records || [];
      var tbody = document.getElementById('recordTable');
      tbody.innerHTML = '';
      list.forEach(function (item) {
        var typeText = item.type === 'expense' ? '支出' : '收入';
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td>' + window.financeApp.escapeHtml(typeText) + '</td>' +
          '<td>' + window.financeApp.escapeHtml(item.category) + '</td>' +
          '<td>' + window.financeApp.escapeHtml(item.money) + '</td>' +
          '<td>' + window.financeApp.escapeHtml(item.createTime) + '</td>' +
          '<td><button class="btn btn-danger" data-id="' + Number(item.id) + '">删除</button></td>';
        tr.querySelector('button').addEventListener('click', function () {
          deleteRecord(Number(this.getAttribute('data-id')));
        });
        tbody.appendChild(tr);
      });
    } catch (e) {
      alert('加载失败');
    }
  }

  async function addRecordFunc() {
    var type = document.getElementById('type').value;
    var category = document.getElementById('category').value;
    var money = Number(document.getElementById('money').value);
    var createTime = document.getElementById('createTime').value;
    if (!money || !createTime) { alert('请填写完整'); return; }
    try {
      await api.post('/api/records', { type: type, category: category, money: money, createTime: createTime });
      alert('添加成功！');
      document.getElementById('money').value = '';
      getRecordList();
    } catch (e) { alert('添加失败'); }
  }

  async function deleteRecord(id) {
    if (!confirm('确定删除？')) return;
    try {
      await api.delete('/api/records/' + id);
      alert('删除成功');
      getRecordList();
    } catch (e) { alert('删除失败'); }
  }
})();
</script>

</body>
</html>
